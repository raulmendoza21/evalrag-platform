version: "3.9"

services:
  api:
    build: ./backend
    env_file: .env
    environment:
      STORAGE_DIR: /storage
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on: [postgres, qdrant, redis]
    volumes:
      - ./backend:/app
      - ./datasets:/datasets:ro
      - storage:/storage

  frontend:
    build: ./frontend
    env_file: .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_TENANT: ${VITE_TENANT:-default}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on: [api]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: evalrag
      POSTGRES_PASSWORD: evalrag
      POSTGRES_DB: evalrag
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    ports: ["5432:5432"]

  qdrant:
    image: qdrant/qdrant:latest
    volumes: [qdrant_data:/qdrant/storage]
    ports: ["6333:6333"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  langfuse:
    image: langfuse/langfuse:latest
    environment:
      DATABASE_URL: postgresql://evalrag:evalrag@postgres:5432/langfuse
      NEXTAUTH_SECRET: change-me
      NEXTAUTH_URL: http://localhost:3000
    depends_on: [postgres]
    ports: ["3000:3000"]

volumes:
  pgdata:
  qdrant_data:
  storage:
